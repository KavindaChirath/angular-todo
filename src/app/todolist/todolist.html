
<div class = "container">
  <h1>TO-DO Apploication</h1>
<form #taskForm="ngForm" (ngSubmit)="onSubmit(taskForm)">
  <div class="form-group">
    <label for="exampleInputEmail1">Task</label>
    <input type="text" class="form-control" id="task" placeholder="Enter task" name="task" [(ngModel)]="newTask" required>
    <small id="errormessage" class="form-text text-danger">Required Field.</small>
  </div>
  <button id = "submitButton" type="submit" class="btn btn-primary">Submit</button>
</form>
<hr>
<table class="table">
  <thead>
    <tr>
      <th scope="col">Task</th>
      <th scope="col">Completed</th>
      <th scope="col">Delete</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let task of taskArray">
      <td>{{ task.task }}</td>
      <td><input id = "myCheckbox" type="checkbox" [checked]="task.isCompleted" (change)="toggleTask(task)"></td>
      <td><button class = "btn btn-danger btn-small" (click)="deleteTask(task)">Delete</button></td>
    </tr>
    <tr>
    </tr>
  </tbody>
</table>
</div>
